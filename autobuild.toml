# autobuild.toml — per-repo declarative configuration (SPEC §16.1, D9).
# Read from the build's branch at workspace provision: every build sees one
# consistent config, and changes to this file flow through the pipeline
# itself. Declarative only — commands are plain shell strings, nothing here
# is evaluated.

# Root scalars must appear before the first TOML table.
baseBranch = "main"
capacity = 10             # concurrent builds for this repo
# Forge adapter: builtin GitHub by default, or a name registered below.
#forge = "github"
# Trusted Bun modules loaded from this repository before dispatch starts.
# Relative paths and installed package specifiers are both supported.
#plugins = ["./plugins/local.ts", "@acme/autobuild-plugin"]

# Optional review-window hosting for explicitly attached images. Text download
# commands work without it. The release must already exist, be published and
# mutable, and live in a public repository; private source repos may name a
# separate public asset repo. The gh identity needs Contents write permission.
# Hosted copies are deleted automatically after build completion.
#[pr.imageHost]
#provider = "github-release"
#repository = "owner/public-review-assets"
#releaseId = 123456

# Deterministic verbs the kernel may run. `setup` runs after provision and
# after a sandbox rehydrate (§15.6-C); the rest are referenced by name from
# [verify.*] or [finalize.*] check steps.
[commands]
setup = "bun install"
typecheck = "bun tsc --noEmit"
test = "bun run test"

# Dev-server lifecycle (§16.2, D10): config declares, the kernel owns.
# Agents control it only through `ab server start|stop|restart|status|logs`.
# Uncomment when the repo has a server to drive.
#[server]
#start = "bun dev"
#url = "http://localhost:3000"   # readiness probe target
#readyTimeout = 60               # seconds

[verify]
# These are the configured universe/order. A plan may select any optional step
# in opening `verifySteps` front matter; `always = true` on a step would make it
# mandatory. Plans without metadata select all three.
steps = ["types", "unit", "dashboard"]

[verify.types]
kind = "check"        # deterministic: command + pass/fail, never an agent
command = "typecheck" # ref into [commands]

[verify.unit]
kind = "check"
command = "test"

# Visual evidence for dashboard-touching builds. Applicability is evaluated by
# the kernel from the build-owned diff; the skill never inspects Git or skips.
[verify.dashboard]
kind = "agent"
skill = "ab-verify-dashboard"
paths = ["src/cli/dashboard/**", "src/cli/dispatch.ts", "tools/dashboard-capture.ts", ".agents/skills/ab-verify-dashboard/SKILL.md"]

# Agent-verify example — a skill run with a pass|fail|skip verdict (§5):
#[verify.e2e]
#kind = "agent"
#skill = "ab-verify-e2e"
#needsServer = true

# Optional ordered post-steps. Checks run deterministic command refs without
# an agent session; agents run the exact configured skill. Either kind is
# failure-tolerant: a failure files an observation and never kills a green
# build (§5).
[finalize]
steps = ["changelog"]

[finalize.changelog]
kind = "agent"
skill = "ab-finalize-changelog"

# Check post-step example:
#[finalize.publish]
#kind = "check"
#command = "publish"             # ref into [commands]

# Agent post-step example:
#[finalize.release-notes]
#kind = "agent"
#skill = "ab-release-notes"      # exact installed skill name

# Runtime/model/extensions configuration (§9) is one open map of roles. The
# reserved `default` entry is the repo-wide inheritance base and is never
# dispatched as a phase. Each phase role overrides it independently per field.
# Adding a runtime touches only the adapter registry; two ship today (claude,
# pi), and an unregistered or incompatible merged pair fails before launch.
[roles.default]
runtime = "pi"                          # repo-wide default runtime
model = "openai-codex/gpt-5.6-sol"      # repo-wide default model, provider-qualified (`ab models` looks ids up)
# extensions unset ⇒ hermetic by default (no internet / sub-agents / MCP).

# A role's runtime, model, and extensions each inherit independently from
# `default`; a set extensions list replaces rather than unions. The exact
# merged runtime/model pair must be compatible — no model-driven runtime search
# and no substitution of a runtime-local default for an incompatible model.
# Mixing models across roles is intentional: both reviewers use Kimi K3.
# Extension package names match installed Pi package sources as substrings; MCP
# remains off unless named. Internet access stays outside implementation.
[roles.plan]
extensions = ["subagents", "web-access"]

[roles.implement]
extensions = ["subagents"]

[roles.plan-review]
runtime = "pi"
model = "kimi-coding/k3"
extensions = ["web-access"]

[roles.code-review]
runtime = "pi"
model = "kimi-coding/k3"
extensions = ["web-access"]

[policy]
stallRounds = 3          # same finding surviving N rounds escalates (§15.4)
maxVerifyAttempts = 3
maxReconcileAttempts = 3
maxReviewRounds = 4
# Structured observations are harvested on back-pressure by `ab dispatch`.
# The workflow is repository-scoped and independent of build capacity; its two
# optional runtime/model overrides are `[roles.harvest]` and
# `[roles.harvest-review]`.
harvestThreshold = 5

# Ticket source and lifecycle states (§3.2, §3.3, §13). The Linear API key is a
# secret — set the LINEAR_API_KEY environment variable (a local .env works),
# never put it in this file.
[tickets]
source = "linear"
teamKey = "AUT"                 # Linear team key ("Auto-build")
readyLabels = []                 # labels that additionally narrow readiness ([] = no label gate)
# Required: the sole ready gate for this repo (readyLabels is empty). The AUT
# team's Linear workflow has no "Ready" state — "Todo" is the column tickets sit
# in before claim() moves them to "In Progress". Matched case-sensitively.
readyState = "Todo"
claimedState = "In Progress"    # workflow state claim() moves an issue to
createState = "Backlog"         # state new tickets are filed into (absent = provider default)
triageState = "Backlog"         # where bounced/aborted/closed-unmerged tickets return (team AUT has Triage disabled; "Backlog" is also the linear default)
# — or file-based: source = "file" with readyState = "ready" and optional dir = "tickets"

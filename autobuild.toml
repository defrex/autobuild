# autobuild.toml — per-repo declarative configuration (SPEC §16.1, D9).
# Read from the build's branch at workspace provision: every build sees one
# consistent config, and changes to this file flow through the pipeline
# itself. Declarative only — commands are plain shell strings, nothing here
# is evaluated.

[project]
baseBranch = "main"

# Deterministic verbs the kernel may run. `setup` runs after provision and
# after a sandbox rehydrate (§15.6-C); the rest are referenced by name from
# [verify.*] check steps.
[commands]
setup = "bun install"
lint = "bun lint"
typecheck = "bun tsc --noEmit"
test = "bun test"

# Dev-server lifecycle (§16.2, D10): config declares, the kernel owns.
# Agents control it only through `ab server start|stop|restart|status|logs`.
# Uncomment when the repo has a server to drive.
#[server]
#start = "bun dev"
#url = "http://localhost:3000"   # readiness probe target
#readyTimeout = 60               # seconds

[verify]
steps = ["types", "unit"]

[verify.types]
kind = "check"        # deterministic: command + pass/fail, never an agent
command = "typecheck" # ref into [commands]

[verify.unit]
kind = "check"
command = "test"

# Agent-verify example — a skill run with a pass|fail verdict (§5):
#[verify.e2e]
#kind = "agent"
#skill = "ab-verify-e2e"
#needsServer = true

# Optional post-steps; failure-tolerant — a failed step files an observation,
# it never kills a green build (§5).
[finalize]
steps = []

# Two-axis runtime/model configuration (§9). Two independent axes — the
# `runtime` that executes a session and the `model` it runs on — are set once
# here as the repo-wide default and overridden per step in [roles]. Adding a
# runtime touches only the adapter registry, never the kernel; two runtimes
# ship today (claude, pi), and a config naming an unregistered one fails
# loudly before any build launches.
[agent]
runtime = "claude"   # no model ⇒ the runtime's own default (claude: SDK default)

# Per-step overrides, most-specific-first: `runtime + model` pins the pair;
# `runtime` alone uses that runtime's default model; `model` alone routes to a
# runtime that serves it (the default runtime wins when it qualifies); neither
# ⇒ the [agent] default. Mixing models across roles is intentional — a
# different reviewer catches more. All roles below equal the default today, so
# they can be omitted; kept as living examples of the shape.
[roles]
plan = { runtime = "claude" }
plan-review = { runtime = "claude" }
implement = { runtime = "claude" }
code-review = { runtime = "claude" }
# Route a step to the pi runtime (serves Kimi/Moonshot and GPT/OpenAI models),
# with the model id taken from config, not hardcoded. Uncomment to experiment:
#code-review = { runtime = "pi", model = "kimi-k3" }   # runtime + model, exactly this pair
#plan = { model = "gpt-5.6-sol" }                      # model only ⇒ routes to pi (it serves GPT)

[policy]
stallRounds = 3          # same finding surviving N rounds escalates (§15.4)
maxVerifyAttempts = 3
maxReconcileAttempts = 3
maxReviewRounds = 5

[dispatcher]
capacity = 3             # concurrent builds for this repo
readyLabels = [] # labels that mark a ticket dispatchable ([] = no label gate)
# Required: the sole dispatch gate for this repo (readyLabels is empty). The AUT
# team's Linear workflow has no "Ready" state — "Todo" is the column tickets sit
# in before claim() moves them to "In Progress". Matched case-sensitively.
readyState = "Todo"

# Ticket source the dispatcher drives (§3.2, §13). The Linear API key is a
# secret — set the LINEAR_API_KEY environment variable (a local .env works),
# never put it in this file.
[tickets]
source = "linear"
teamKey = "AUT"                 # Linear team key ("Auto-build")
claimedState = "In Progress"    # workflow state claim() moves an issue to
createState = "Backlog"         # state new tickets are filed into (absent = provider default)
triageState = "Backlog"         # where bounced/aborted/closed-unmerged tickets return (team AUT has Triage disabled; "Backlog" is also the linear default)
# — or file-based: source = "file" with dir = "tickets"

# Cron schedules for outer-loop processes (§12).
#[outer]
#"ingest:sentry" = { cron = "0 */4 * * *" }
#harvest = { cron = "0 9 * * *" }

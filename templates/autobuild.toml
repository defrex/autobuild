# autobuild.toml — per-repo declarative configuration (SPEC §16.1, D9).
# Read from the build's branch at workspace provision: every build sees one
# consistent config, and changes to this file flow through the pipeline
# itself. Declarative only — commands are plain shell strings, nothing here
# is evaluated.

[project]
baseBranch = "main"

# Deterministic verbs the kernel may run. `setup` runs after provision and
# after a sandbox rehydrate (§15.6-C); the rest are referenced by name from
# [verify.*] check steps.
[commands]
setup = "bun install"
lint = "bun lint"
typecheck = "bun tsc --noEmit"
test = "bun test"

# Dev-server lifecycle (§16.2, D10): config declares, the kernel owns.
# Agents control it only through `ab server start|stop|restart|status|logs`.
# Uncomment when the repo has a server to drive.
#[server]
#start = "bun dev"
#url = "http://localhost:3000"   # readiness probe target
#readyTimeout = 60               # seconds

[verify]
steps = ["types", "unit"]

[verify.types]
kind = "check"        # deterministic: command + pass/fail, never an agent
command = "typecheck" # ref into [commands]

[verify.unit]
kind = "check"
command = "test"

# Agent-verify example — a skill run with a pass|fail verdict (§5):
#[verify.e2e]
#kind = "agent"
#skill = "ab-verify-e2e"
#needsServer = true

# Optional post-steps; failure-tolerant — a failed step files an observation,
# it never kills a green build (§5).
[finalize]
steps = []

# Two-axis runtime/model configuration (§9): the `runtime` that executes a
# session and the `model` it runs on. Set the repo-wide default in [agent],
# override per step in [roles]. Registered runtimes: `claude` (Claude models)
# and `pi` (Kimi/Moonshot + GPT/OpenAI). Adding a runtime touches only the
# adapter registry, never the kernel.
[agent]
runtime = "claude"   # no model ⇒ the runtime's own default

# Per-step overrides, most-specific-first (runtime+model / runtime / model /
# neither). Mixing models across roles is intentional — a different reviewer
# catches more. Uncomment and edit to experiment:
#[roles]
#code-review = { runtime = "pi", model = "kimi-k3" }   # exactly this pair
#plan = { model = "gpt-5.6-sol" }                      # model only ⇒ routes to pi

[policy]
stallRounds = 3          # same finding surviving N rounds escalates (§15.4)
maxVerifyAttempts = 3
maxReconcileAttempts = 3
maxReviewRounds = 5

[dispatcher]
capacity = 1             # concurrent builds for this repo
# Absent readyLabels = the ticket source's own gate: the file tracker's `ready/`
# directory, or the "autobuild" label on Linear. Set it only to require labels
# ON TOP of that — with the file tracker, setting it here means `mv`ing a ticket
# into ready/ is no longer enough to dispatch it.
#readyLabels = ["autobuild"]
# Required: the single workflow state a ticket must sit in to be dispatched.
# Without it every ticket from the source would be eligible in any state,
# including completed ones. The file tracker maps this to a state directory
# (`ready` → `ready/`); Linear users must name their own ready workflow state
# exactly (it is matched case-sensitively).
readyState = "ready"

# Ticket source the dispatcher drives (§3.2, §13).
#
# Omit this table entirely and you get a local file tracker at
# `.autobuild/tickets/` — four state directories (triage/ ready/ doing/ done/)
# of markdown tickets, where a ticket's state is the directory it's in. No
# secret, no config, gitignored (the tracker excludes itself), `ls` is the UI,
# and `mv triage/x.md ready/` dispatches. `/ab-tickets` teaches an agent to
# drive it.
#
# To use Linear instead — the API key is a secret, so set the LINEAR_API_KEY
# environment variable (a local .env works), never put it in this file:
#[tickets]
#source = "linear"
#teamKey = "ENG"                 # Linear team key
#claimedState = "In Progress"    # workflow state claim() moves an issue to
#createState = "Triage"          # state new tickets are filed into (absent = provider default)
#
# Or to put the file tracker somewhere other than the default:
#[tickets]
#source = "file"
#dir = "tickets"                 # optional; default ".autobuild/tickets"

# Cron schedules for outer-loop processes (§12).
#[outer]
#"ingest:sentry" = { cron = "0 */4 * * *" }
#harvest = { cron = "0 9 * * *" }
